apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: snatpolicies.aci.snat
spec:
  group: aci.snat
  names:
    kind: SnatPolicy
    listKind: SnatPolicyList
    plural: snatpolicies
    singular: snatpolicy
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              destIp:
                items:
                  type: string
                type: array
              selector:
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: Selection of Pods
                    properties: null
                    type: object
                  namespace:
                    type: string
                type: object
              snatIp:
                items:
                  type: string
                type: array
            type: object
            x-kubernetes-validations:
            - message: 'SnatPolicy is invalid: at least one of spec.snatIp, spec.selector.namespace,
                or spec.selector.labels must be specified

                '
              rule: '(has(self.snatIp) && self.snatIp.size() > 0) || (has(self.selector)
                && has(self.selector.namespace) && self.selector.namespace != "")
                || (has(self.selector) && has(self.selector.labels) && self.selector.labels.size()
                > 0)

                '
          status:
            additionalProperties:
              type: string
            properties: null
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
